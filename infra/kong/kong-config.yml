_format_version: "3.0"
_transform: true

services:
  - name: tenant-service
    url: http://tenant-service-api:3001
    routes:
      - name: tenants-route
        paths:
          - /tenants
          - /internal/tenants
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE

  - name: scheduling-service
    url: http://scheduling-service-api:3000
    routes:
      - name: appointments-route
        paths:
          - /appointments
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE

plugins:
  - name: correlation-id
    config:
      header_name: x-correlation-id
      generator: uuid#counter
      echo_downstream: true

  - name: rate-limiting
    config:
      minute: 100
      hour: 1000
      policy: local
      fault_tolerant: true
      hide_client_headers: false

  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - x-correlation-id
      exposed_headers:
        - x-correlation-id
      credentials: true
      max_age: 3600